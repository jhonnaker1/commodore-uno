# Memory configuration that keeps the tiny BASIC-stub header at $1201
# (matching TXTTAB when any expansion RAM is present, so autostart's
# RUN still finds it) but places all the real code/data starting at
# $2001 -- deliberately leaving the entire $1000-$1FFF range (the
# stock/base 4K, unused here) untouched, so the game can redirect the
# VIC's screen register back to $1E00 (the address confirmed to render
# correctly, unlike the $1000 the KERNAL relocates it to when it
# detects expansion RAM) without the linker ever placing code there.
SYMBOLS {
    __LOADADDR__:  type = import;
    __EXEHDR__:    type = import;
    __STACKSIZE__: type = weak, value = $0800; # 2k stack
}
MEMORY {
    ZP:       file = "", define = yes, start = $0002, size = $001A;
    LOADADDR: file = %O,               start = $11FF, size = $0002;
    HEADER:   file = %O,               start = $1201, size = $000C;
    # Padding so the PRG file's bytes land at the right addresses on
    # load -- a plain PRG load is a straight sequential copy, so the
    # gap between HEADER and MAIN has to physically exist in the file
    # as filler, not just be implied by address math.
    GAP:      file = %O, fill = yes,   start = $120D, size = $0DF4;
    MAIN:     file = %O, define = yes, start = $2001, size = $5FF3 - __STACKSIZE__;
}
SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    LOADADDR: load = LOADADDR, type = ro;
    EXEHDR:   load = HEADER,   type = ro;
    STARTUP:  load = MAIN,     type = ro;
    LOWCODE:  load = MAIN,     type = ro,  optional = yes;
    ONCE:     load = MAIN,     type = ro,  optional = yes;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro;
    DATA:     load = MAIN,     type = rw;
    INIT:     load = MAIN,     type = bss;
    BSS:      load = MAIN,     type = bss, define   = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
